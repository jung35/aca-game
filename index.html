<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crazy Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="wrapper">
      <!-- ── Lobby ─────────────────────────────────── -->
      <div id="lobby">
        <div id="lobby-logo">
          💣 Crazy Arcade
          <span>WATER BALLOON BATTLE</span>
        </div>

        <!-- ── Online Room Panel (always visible) ── -->
        <div id="room-panel">
          <div id="room-left">
            <div class="room-section-label">YOUR ROOM CODE</div>
            <div id="room-code-display">
              <span id="lobby-room-code">……</span>
              <button id="room-copy-btn" title="Copy room code">📋</button>
              <button id="room-refresh-btn" title="New room code">🔄</button>
            </div>
            <div id="room-status-line">Waiting for players…</div>
          </div>
          <div id="room-divider"></div>
          <div id="room-right">
            <div class="room-section-label">JOIN A ROOM</div>
            <div id="room-join-row">
              <input id="room-join-input" type="text" maxlength="8"
                placeholder="Enter code…" autocomplete="off" spellcheck="false" />
              <button id="room-join-btn">⚡ Join</button>
            </div>
            <div id="room-join-msg"></div>
          </div>
        </div>

        <!-- ── Player slots grid ── -->
        <div id="slots-grid">
          <!-- 8 slots rendered by JS -->
        </div>
        <div id="slots-hint">
          <span>⬅ click empty slot to add CPU</span>
          <span>🖱️ right-click slot to change team</span>
        </div>

        <!-- ── Map grid ── -->
        <div id="map-grid"></div>

        <div id="name-row">
          <label id="name-label" for="name-input">👤 Your Name</label>
          <div id="name-field">
            <input id="name-input" type="text" maxlength="16" autocomplete="off" spellcheck="false" />
            <button id="name-random-btn" title="Random name">🎲</button>
          </div>
        </div>

        <!-- Character customization + Team picker -->
        <div id="char-picker">
          <div id="char-preview-col">
            <canvas id="char-preview" width="70" height="80"></canvas>
            <div id="char-preview-label">Preview</div>
          </div>
          <div id="char-options">
            <div class="char-row">
              <span class="char-row-label">👕 Outfit</span>
              <div id="outfit-cards" class="outfit-row"></div>
            </div>
            <div class="char-row">
              <span class="char-row-label">🧑 Skin</span>
              <div id="skin-swatches" class="swatch-row"></div>
            </div>
          </div>
        </div>

        <div id="lobby-actions">
          <button id="play-btn">▶ Start</button>
        </div>
        <div id="net-status-bar">
          <span id="net-status">🔴 Not connected</span>
          <span id="net-latency"></span>
        </div>
      </div>

      <!-- ── Game ──────────────────────────────────── -->
      <div id="game-wrap" class="hidden">
        <div id="game-topbar">
          <button id="back-btn">◀ Lobby</button>
          <div id="gtitle">💣 Crazy Arcade</div>
          <div class="toggle-wrap" id="debug-toggle">
            <span class="toggle-label">Debug</span>
            <div class="toggle-pill">
              <div class="toggle-knob"></div>
            </div>
          </div>
        </div>

        <div id="game-body">
          <div id="arena-wrap">
            <div id="arena-outer">
              <div id="arena">
                <canvas id="bg-canvas"></canvas>
                <canvas id="sprite-canvas"></canvas>
                <canvas id="debug-canvas"></canvas>
              </div>
            </div>
            <div id="tip">
              Move: <kbd>↑↓←→</kbd> / <kbd>WASD</kbd> &nbsp;|&nbsp;
              Balloon: <kbd>Space</kbd> / <kbd>X</kbd>
            </div>
          </div>

          <div id="sidebar">
            <div id="sidebar-title">PLAYERS</div>
            <div id="hud"></div>
            <div id="net-bar">
              <span id="net-status">Offline</span>
              <span id="net-latency"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Message overlay ───────────────────────── -->
      <div id="msg-overlay" class="hidden">
        <div id="msg-box"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
